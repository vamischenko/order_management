services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: order_management_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - order_network

  nginx:
    image: nginx:1.25-alpine
    container_name: order_management_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - order_network

  postgres:
    image: postgres:16-alpine
    container_name: order_management_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-order_management}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-order_management}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - order_network

  redis:
    image: redis:7-alpine
    container_name: order_management_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - order_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: order_management_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work redis --queue=exports,default --sleep=3 --tries=3 --max-time=3600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - order_network

volumes:
  postgres_data:
  redis_data:

networks:
  order_network:
    driver: bridge
